## Usage
1. Select a long-running, trusted process (svchost.exe, explorer.exe).
2. Obtain the PID of the target process.
3. Inject and verify the payload executes in the target process context.

## Detection Evasion
- Prefer process hollowing (T1055.012) over classic injection for better stealth.
- Avoid injecting into security product processes.
- Use indirect syscalls to bypass user-mode API hooks.

## MITRE ATT&CK
- T1055.001 — Process Injection: Dynamic-link Library Injection
- T1055.012 — Process Injection: Process Hollowing
