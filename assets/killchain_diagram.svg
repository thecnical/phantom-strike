<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="recon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="weapon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deliver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="exploit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="install" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="control" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#FF6B00"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FF6B00">MITRE ATT&CK KILL CHAIN</text>
  
  <!-- Phase 1: Recon -->
  <rect x="50" y="90" width="120" height="150" rx="8" fill="url(#recon)" stroke="#FF6B00" stroke-width="2"/>
  <text x="110" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">RECON</text>
  <text x="110" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#93c5fd">OSINT</text>
  <text x="110" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#93c5fd">Network Scan</text>
  <text x="110" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#93c5fd">Web Crawl</text>
  <text x="110" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa">phantom-osint</text>
  <text x="110" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#60a5fa">phantom-network</text>
  
  <!-- Arrow 1 -->
  <line x1="170" y1="165" x2="190" y2="165" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Phase 2: Weaponize -->
  <rect x="200" y="90" width="120" height="150" rx="8" fill="url(#weapon)" stroke="#FF6B00" stroke-width="2"/>
  <text x="260" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">WEAPONIZE</text>
  <text x="260" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fcd34d">AI Analysis</text>
  <text x="260" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fcd34d">Payload Gen</text>
  <text x="260" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fcd34d">Vuln Research</text>
  <text x="260" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">AI Engine</text>
  <text x="260" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fbbf24">phantom-stealth</text>
  
  <!-- Arrow 2 -->
  <line x1="320" y1="165" x2="340" y2="165" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Phase 3: Deliver -->
  <rect x="350" y="90" width="120" height="150" rx="8" fill="url(#deliver)" stroke="#FF6B00" stroke-width="2"/>
  <text x="410" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">DELIVER</text>
  <text x="410" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c4b5fd">Exploit Delivery</text>
  <text x="410" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c4b5fd">C2 Deploy</text>
  <text x="410" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c4b5fd">Phishing</text>
  <text x="410" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa">phantom-exploit</text>
  <text x="410" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a78bfa">phantom-c2</text>
  
  <!-- Arrow 3 -->
  <line x1="470" y1="165" x2="490" y2="165" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Phase 4: Exploit -->
  <rect x="500" y="90" width="120" height="150" rx="8" fill="url(#exploit)" stroke="#FF6B00" stroke-width="2"/>
  <text x="560" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">EXPLOIT</text>
  <text x="560" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5">Code Execution</text>
  <text x="560" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5">Privilege Esc</text>
  <text x="560" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fca5a5">Data Access</text>
  <text x="560" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f87171">phantom-exploit</text>
  <text x="560" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#f87171">phantom-cred</text>
  
  <!-- Arrow 4 -->
  <line x1="620" y1="165" x2="640" y2="165" stroke="#FF6B00" stroke-width="2" marker-end="url(#arrow)"/>
  
  <!-- Phase 5: Install -->
  <rect x="650" y="90" width="110" height="150" rx="8" fill="url(#install)" stroke="#FF6B00" stroke-width="2"/>
  <text x="705" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="white">INSTALL</text>
  <text x="705" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6ee7b7">Backdoor</text>
  <text x="705" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6ee7b7">Rootkit</text>
  <text x="705" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#6ee7b7">Persistence</text>
  <text x="705" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34d399">phantom-post</text>
  <text x="705" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#34d399">phantom-c2</text>
  
  <!-- Target Input -->
  <text x="110" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD700">TARGET INPUT ↓</text>
  <line x1="110" y1="80" x2="110" y2="90" stroke="#FFD700" stroke-width="2"/>
  
  <!-- Report Output -->
  <text x="705" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFD700">REPORT OUTPUT ↓</text>
  <line x1="705" y1="240" x2="705" y2="250" stroke="#FFD700" stroke-width="2"/>
</svg>
