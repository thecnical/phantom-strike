name: 🔥 CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: 🎨 Lint with ruff
        run: |
          ruff check phantom/

      - name: 📝 Check formatting with black
        run: |
          black --check phantom/

      - name: 🔍 Type check with mypy
        run: |
          mypy phantom/ --ignore-missing-imports

      - name: 🧪 Run tests
        run: |
          pytest tests/ -v --cov=phantom --cov-report=xml --cov-report=term

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛡️ Run Bandit security scan
        uses: PyCQA/bandit@main
        with:
          args: "-r phantom/ -f json -o bandit-report.json || true"

      - name: 🔒 Run Safety check
        run: |
          pip install safety
          safety check

  build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        run: |
          docker build -t phantom-strike:test .

      - name: ✅ Test Docker image
        run: |
          docker run --rm phantom-strike:test phantom --help
