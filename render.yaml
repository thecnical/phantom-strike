# Render.com Deployment Configuration
# Deploy: Connect GitHub repo to Render → it auto-reads this file

services:
  - type: web
    name: phantom-strike-api
    runtime: docker
    repo: https://github.com/thecnical/phantom-strike
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # ── CRITICAL: Backend must use LOCAL keys, not call itself ──
      - key: PHANTOM_BACKEND_ENABLED
        value: "false"   # Backend uses local keys directly — prevents infinite loop

      # ── AI Provider Keys (set these in Render Dashboard → Environment) ──
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false

      # ── Server Config ──
      - key: PORT
        value: "10000"
      - key: PHANTOM_LOG_LEVEL
        value: "WARNING"
    healthCheckPath: /health
    numInstances: 1
    autoDeploy: true
