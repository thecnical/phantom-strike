# Render.com Deployment Configuration
# Deploy: Connect GitHub repo to Render → it auto-reads this file

services:
  - type: web
    name: phantom-strike-api
    runtime: docker
    repo: https://github.com/phantom-strike/phantom-strike
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CEREBRAS_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: SAMBANOVA_API_KEY
        sync: false
      - key: PORT
        value: "10000"
    healthCheckPath: /health
    numInstances: 1
    autoDeploy: true
